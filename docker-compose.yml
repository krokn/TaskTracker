services:
  postgres:
    image: postgres:17
    container_name: postgres_db
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  django:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: django_app

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - postgres

volumes:
  postgres_data: